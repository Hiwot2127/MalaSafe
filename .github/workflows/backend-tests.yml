name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: malasafe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/malasafe_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/malasafe_test
      ENVIRONMENT: development
      SECRET_KEY: ci-test-secret-key-0123456789-abcdef-32plus
      RATE_LIMIT_ENABLED: false
      CACHE_ENABLED: false
      MONTHLY_CLOSE_ENABLED: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # reportlab -> rlPyCairo -> pycairo compiles from C source and needs the cairo
      # dev headers; lightgbm needs libgomp1 at import time. These mirror the apt
      # packages installed in backend/Dockerfile.
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config libgomp1

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov
