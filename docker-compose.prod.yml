# MalaSafe Production Docker Compose
# Run with: docker compose -f docker-compose.prod.yml up -d
# This configuration is optimized for production deployment

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17.6
    container_name: malasafe-postgres-prod
    environment:
      POSTGRES_DB: malasafe
      POSTGRES_USER: malasafe
      POSTGRES_PASSWORD: qazwsxedc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-malasafe}"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    restart: unless-stopped
    networks:
      - malasafe-network

  # Redis Cache & Message Broker
  redis:
    image: redis:8.6.3-trixie
    container_name: malasafe-redis-prod
    volumes:
      - redis_data:/data
    # healthcheck:
    #   test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    restart: unless-stopped
    networks:
      - malasafe-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: malasafe-backend-prod
    env_file:
      - ./backend/.env.production
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_models:/app/models
    depends_on:
      - postgres
      - redis
      # postgres:
      #   condition: service_healthy
      # redis:
      #   condition: service_healthy
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    networks:
      - malasafe-network

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: malasafe-celery-worker-prod
    env_file:
      - ./backend/.env.production
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_models:/app/models
    depends_on:
      - postgres
      - redis
      # postgres:
      #   condition: service_healthy
      # redis:
      #   condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    networks:
      - malasafe-network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: malasafe-celery-beat-prod
    env_file:
      - ./backend/.env.production
    volumes:
      - backend_logs:/app/logs
    depends_on:
      - postgres
      - redis
      # postgres:
      #   condition: service_healthy
      # redis:
      #   condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    networks:
      - malasafe-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: malasafe-frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: "https://localhost:3000/api/v1"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    networks:
      - malasafe-network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_logs:
  backend_models:

networks:
  malasafe-network:
    driver: bridge
