[pytest]
# Pytest configuration for MalaSafe backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.11

# Command line options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage report
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Warnings
    -W ignore::DeprecationWarning
    # Asyncio mode
    --asyncio-mode=auto

# Markers for categorizing tests
markers =
    asyncio: mark test as async
    slow: mark test as slow running
    integration: mark test as integration test
    unit: mark test as unit test
    auth: mark test as authentication related
    cache: mark test as cache related
    operations: mark test as operations related
    analytics: mark test as analytics related
    upload: mark test as upload related
    prediction: mark test as prediction related
    recommendation: mark test as recommendation related
    rate_limit: mark test as rate limit test (keeps rate limiting enabled)

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
